name: Build App (Linux + Windows + macOS)

on:
  push:
    branches: ["main"]

jobs:

  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r money_manager/requirements.txt
          pip install pyinstaller

      - name: Build App
        working-directory: money_manager
        run: |
          pyinstaller --onefile --name MoneyManager \
          --paths=. \
          --add-data "resources:resources" \
          --add-data "database:database" \
          --hidden-import PySide6.QtCore \
          --hidden-import PySide6.QtGui \
          --hidden-import PySide6.QtWidgets \
          main.py

      - name: Fix Windows Paths
        if: runner.os == 'Windows'
        working-directory: money_manager
        run: |
          pyinstaller --onefile --name MoneyManager ^
          --paths=. ^
          --add-data "resources;resources" ^
          --add-data "database;database" ^
          --hidden-import PySide6.QtCore ^
          --hidden-import PySide6.QtGui ^
          --hidden-import PySide6.QtWidgets ^
          main.py

      - name: Create DMG (macOS only)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dmg
          cp -r money_manager/dist/* dmg/
          hdiutil create -volname MoneyManager -srcfolder dmg -ov -format UDZO MoneyManager.dmg

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-build
          path: |
            money_manager/dist/*
            MoneyManager.dmg
