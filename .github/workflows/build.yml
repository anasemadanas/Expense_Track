name: Build App (Linux + Windows + macOS)

on:
  push:
    branches: ["main"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest     # Apple Silicon (ARM64)
          - macos-13         # Intel x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r money_manager/requirements.txt
          pip install pyinstaller

      # ---------------- WINDOWS ----------------
      - name: Build Windows EXE
        if: runner.os == 'Windows'
        shell: bash
        run: |
          python -m PyInstaller --noconfirm --onefile --windowed \
          --name MoneyManager \
          --paths=money_manager \
          --add-data "money_manager/resources;resources" \
          --add-data "money_manager/database;database" \
          --hidden-import PySide6.QtCore \
          --hidden-import PySide6.QtGui \
          --hidden-import PySide6.QtWidgets \
          money_manager/main.py

      # ---------------- LINUX ----------------
      - name: Build Linux Binary
        if: runner.os == 'Linux'
        shell: bash
        run: |
          python -m PyInstaller --noconfirm --onefile --windowed \
          --name MoneyManager \
          --paths=money_manager \
          --add-data "money_manager/resources:resources" \
          --add-data "money_manager/database:database" \
          --hidden-import PySide6.QtCore \
          --hidden-import PySide6.QtGui \
          --hidden-import PySide6.QtWidgets \
          money_manager/main.py

      # ---------------- MAC ARM64 ----------------
      - name: Build macOS ARM64 App
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          python -m PyInstaller --noconfirm --windowed \
          --name MoneyManager-ARM64 \
          --paths=money_manager \
          --add-data "money_manager/resources:resources" \
          --add-data "money_manager/database:database" \
          --hidden-import PySide6.QtCore \
          --hidden-import PySide6.QtGui \
          --hidden-import PySide6.QtWidgets \
          money_manager/main.py

      - name: Create ARM64 DMG
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir dmg
          cp -R dist/MoneyManager-ARM64.app dmg/
          hdiutil create -volname MoneyManager-ARM64 \
          -srcfolder dmg \
          -ov \
          -format UDZO \
          MoneyManager-ARM64.dmg

      # ---------------- MAC INTEL x64 ----------------
      - name: Build macOS x64 App
        if: matrix.os == 'macos-13'
        shell: bash
        run: |
          python -m PyInstaller --noconfirm --windowed \
          --name MoneyManager-x64 \
          --paths=money_manager \
          --add-data "money_manager/resources:resources" \
          --add-data "money_manager/database:database" \
          --hidden-import PySide6.QtCore \
          --hidden-import PySide6.QtGui \
          --hidden-import PySide6.QtWidgets \
          money_manager/main.py

      - name: Create x64 DMG
        if: matrix.os == 'macos-13'
        shell: bash
        run: |
          mkdir dmg
          cp -R dist/MoneyManager-x64.app dmg/
          hdiutil create -volname MoneyManager-x64 \
          -srcfolder dmg \
          -ov \
          -format UDZO \
          MoneyManager-x64.dmg

      # ---------------- UPLOAD ----------------
      - name: Upload Windows Build
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Build
          path: dist/*

      - name: Upload Linux Build
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: Linux-Build
          path: dist/*

      - name: Upload macOS ARM64 Build
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macOS-ARM64-Build
          path: |
            dist/*
            MoneyManager-ARM64.dmg

      - name: Upload macOS x64 Build
        if: matrix.os == 'macos-13'
        uses: actions/upload-artifact@v4
        with:
          name: macOS-x64-Build
          path: |
            dist/*
            MoneyManager-x64.dmg
