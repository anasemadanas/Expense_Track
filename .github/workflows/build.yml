name: Build App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Debug files
      run: ls -R

    - name: Build
      working-directory: money_manager
      run: |
        pyinstaller --onefile --name MoneyManager \
        --add-data "resources:resources" \
        --add-data "database:database" \
        main.py
        
    - name: Upload build
      uses: actions/upload-artifact@v4
      with:
        name: MoneyManager-build
        path: money_manager/dist/
