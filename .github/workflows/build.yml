name: Build App (Linux + Windows + macOS)

on:
  push:
    branches: ["main"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r money_manager/requirements.txt
          pip install pyinstaller

      # ---------------- WINDOWS ----------------
      - name: Build Windows EXE
        if: runner.os == 'Windows'
        shell: bash
        run: |
          python -m PyInstaller --noconfirm --onefile --windowed \
          --name MoneyManager \
          --paths=money_manager \
          --add-data "money_manager/resources;resources" \
          --add-data "money_manager/database;database" \
          --hidden-import PySide6.QtCore \
          --hidden-import PySide6.QtGui \
          --hidden-import PySide6.QtWidgets \
          money_manager/main.py

      # ---------------- LINUX ----------------
      - name: Build Linux Binary
        if: runner.os == 'Linux'
        shell: bash
        run: |
          python -m PyInstaller --noconfirm --onefile --windowed \
          --name MoneyManager \
          --paths=money_manager \
          --add-data "money_manager/resources:resources" \
          --add-data "money_manager/database:database" \
          --hidden-import PySide6.QtCore \
          --hidden-import PySide6.QtGui \
          --hidden-import PySide6.QtWidgets \
          money_manager/main.py

      # ---------------- MACOS ----------------
      - name: Build macOS App
        if: runner.os == 'macOS'
        shell: bash
        run: |
          python -m PyInstaller --noconfirm --windowed \
          --name MoneyManager \
          --paths=money_manager \
          --add-data "money_manager/resources:resources" \
          --add-data "money_manager/database:database" \
          --hidden-import PySide6.QtCore \
          --hidden-import PySide6.QtGui \
          --hidden-import PySide6.QtWidgets \
          money_manager/main.py

      - name: Create DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir dmg
          cp -R dist/MoneyManager.app dmg/
          hdiutil create -volname MoneyManager \
          -srcfolder dmg \
          -ov \
          -format UDZO \
          MoneyManager.dmg

      # ---------------- UPLOAD ----------------
      - name: Upload Windows Build
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Build
          path: dist/*

      - name: Upload Linux Build
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: Linux-Build
          path: dist/*

      - name: Upload macOS Build
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Build
          path: |
            dist/*
            MoneyManager.dmg
