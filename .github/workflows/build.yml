name: Build App (Linux + Windows + macOS)

on:
  push:
    branches: ["main"]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r money_manager/requirements.txt
          pip install pyinstaller


      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --onefile --name MoneyManager \
          --paths=money_manager \
          --add-data "money_manager/resources:resources" \
          --add-data "money_manager/database:database" \
          --hidden-import PySide6.QtCore \
          --hidden-import PySide6.QtGui \
          --hidden-import PySide6.QtWidgets \
          money_manager/main.py


      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile --name MoneyManager ^
          --paths=money_manager ^
          --add-data "money_manager/resources;resources" ^
          --add-data "money_manager/database;database" ^
          --hidden-import PySide6.QtCore ^
          --hidden-import PySide6.QtGui ^
          --hidden-import PySide6.QtWidgets ^
          money_manager/main.py


      - name: Create DMG (macOS only)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dmg
          cp -r dist/* dmg/
          hdiutil create -volname MoneyManager -srcfolder dmg -ov -format UDZO MoneyManager.dmg


      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-build
          path: |
            dist/*
            MoneyManager.dmg
